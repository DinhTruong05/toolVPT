spring.application.name=toolVPT

# Window m?c ??nh. Nęn ch?n ?úng c?a s? trong UI ?? tool t? c?p nh?t x/y/width/height.
toolvpt.window-width=1496
toolvpt.window-height=936
toolvpt.window-x=150
toolvpt.window-y=50

# Vůng quét target tính t? góc trái tręn c?a c?a s? game ?ă ch?n.
toolvpt.region-width=1100
toolvpt.region-height=700

# 0 = không gi?i h?n theo kho?ng cách. Khi hay click nh?m ? rěa, th? 350-500.
toolvpt.max-acceptable-distance=500.0
toolvpt.scan-radius=500

# Cân b?ng gi?a target kh?p mŕu t?t vŕ target g?n tâm nhân v?t.
# T?ng lęn n?u mu?n ?u tięn m?c tięu g?n tâm h?n; gi?m v? 0 n?u ch? mu?n ?u tięn score.
toolvpt.target-distance-weight=0.05
# Target t?nh/??ng nh?: yęu c?u th?y cůng v? trí 2 frame r?i m?i click ?? gi?m click nh?m.
toolvpt.target-stable-frames=2
# N?u target l?ch trong bán kính nŕy thě v?n xem lŕ cůng target ?ang b? animation nh?.
toolvpt.target-lock-radius=45
toolvpt.min-distance-gap=10.0

# Khi c?n canh template/vůng scan thě ??i thŕnh true ?? xu?t debug.png.
# Ch?y ?n ??nh nęn ?? false ?? tránh ghi file lięn t?c.
toolvpt.debug-save-image=false
toolvpt.debug-image-path=debug.png
toolvpt.capture-interval-ms=300

toolvpt.detect-region-x=500
toolvpt.detect-region-y=300
toolvpt.detect-region-width=320
toolvpt.detect-region-height=180

# matcher-accept-score cŕng th?p cŕng khó nh?n nh?ng ít click nh?m h?n.
# N?u debug có target nh?ng không těm th?y, th? t?ng lęn 80-90 ho?c ch?p l?i samples/orc.png, samples/boss.png.
toolvpt.matcher-accept-score=75.0
toolvpt.matcher-step=2
toolvpt.matcher-max-results=30

# detector threshold tuning
toolvpt.detect-fight-threshold=0.72
toolvpt.detect-idle-threshold=0.68
toolvpt.detect-min-confidence=0.55